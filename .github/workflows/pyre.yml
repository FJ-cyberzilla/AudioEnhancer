name: Pyre

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  pyre:
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Sync Environment
        run: uv sync

      - name: Run Pyre
        uses: facebook/pyre-action@v0.1.0
        with:
          repo-directory: './'
          # Pyre now respects the virtual environment managed by uv
          requirements-path: 'pyproject.toml'

      - name: Upload Pyre Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyre-analysis-logs
          path: .pyre/
