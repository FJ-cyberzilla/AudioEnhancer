[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexus-enhancer"
version = "2.0.0"
description = "SOTA 2026 Production-Ready MP3 Quality Enhancer"
authors = [{ name = "Audio Engineering Team" }]
requires-python = ">=3.11"
dependencies = [
    "pedalboard>=0.9.8",
    "rich>=13.7.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "numpy>=1.26.0"
]

[project.scripts]
nexus = "nexus.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
strict = true
ignore_missing_imports = true
