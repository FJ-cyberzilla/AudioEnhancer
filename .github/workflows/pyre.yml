name: Pyre

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  pyre:
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Sync Environment
        run: uv sync

      - name: Run Pyre Directly
        # Bypass the deprecated/failing facebook/pyre-action
        # We run it directly via the environment managed by uv
        run: |
          uv run pyre --noninteractive --output=json > .pyre/type_errors.json || true

      - name: Upload Pyre Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyre-analysis-logs
          path: .pyre/
