name: Nexus SOTA Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Quality Assurance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Dependencies (Including Dev)
        # Explicitly syncing the 'dev' group ensures ruff, mypy, and pytest are installed
        run: uv sync --group dev

      - name: Run Linting (Ruff)
        run: uv run ruff check src/ tests/

      - name: Run Type Checking (Mypy)
        run: uv run mypy src/

      - name: Run Unit Tests (Pytest)
        run: uv run pytest tests/ --junitxml=reports/results.xml

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: reports/
